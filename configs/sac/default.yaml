# configs/sac/default.yaml
env:
  V_MAX: 2.5
  DT: 0.05
  MAX_STEPS: 800
  GOAL_DIST: 0.30
  GOAL_ANGLE: 0.15

sac:
  learning_rate: 0.0003
  buffer_size: 100000
  learning_starts: 1000
  batch_size: 256
  tau: 0.005
  gamma: 0.99
  train_freq: 1
  gradient_steps: 1
  ent_coef: "auto"
  net_arch: [256, 256]

training:
  total_timesteps: 200000
  n_envs: 4
  model_name: "default"